name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            echo "Connected"

      - name: Upload files via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git*' --exclude='node_modules/' --exclude='.claude/' --exclude='temporary screenshots/' --exclude='serve.mjs' --exclude='screenshot.mjs' --exclude='package.json' --exclude='package-lock.json' --exclude='*.md' --exclude='wp-config.php' --exclude='homepage.html'
          path: ./
          remote_path: public_html/
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_port: 65002
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_password: ${{ secrets.SSH_PASSWORD }}
