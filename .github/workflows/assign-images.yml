name: Assign Featured Images

on:
  workflow_dispatch:

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload PHP script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "assign-images.php"
          target: /tmp/

      - name: Run script on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          envs: WP_USER,WP_APP_PASS,PEXELS_KEY,SEARCH_QUERY
          script: |
            export WP_USER="${{ secrets.WP_USER }}"
            export WP_APP_PASS="${{ secrets.WP_APP_PASS }}"
            export PEXELS_KEY="${{ secrets.PEXELS_KEY }}"
            export SEARCH_QUERY="automation workflow technology n8n"
            php /tmp/assign-images.php
            rm /tmp/assign-images.php
