<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — Mettamotion Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { navy:{DEFAULT:'#080d18',2:'#0d1526',3:'#111d35',4:'#182440'}, brand:{DEFAULT:'#1a6fff',dim:'#1256cc',glow:'#4d97ff'}, teal:{DEFAULT:'#00d4ff',dim:'#00a8cc'}, smoke:{DEFAULT:'#8a9bbf',dim:'#3a4a6b'} },
        fontFamily: { display:['Space Grotesk','sans-serif'], body:['DM Sans','sans-serif'], mono:['Space Mono','monospace'] }
      }}
    }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#080d18;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px 128px;opacity:0.025}
    #nav{transition:background .3s,box-shadow .3s}
    #nav.scrolled{background:rgba(8,13,24,.92);backdrop-filter:blur(14px);box-shadow:0 1px 0 rgba(255,255,255,.05)}
    .logo-img{filter:brightness(0) invert(1) drop-shadow(0 0 6px rgba(0,212,255,.45));transition:transform .2s}
    .logo-img:hover{transform:scale(1.06)}
    .btn-p{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:8px;
      background:#1a6fff;color:#fff;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;text-decoration:none;
      box-shadow:0 4px 20px rgba(26,111,255,.35);transition:background .2s,transform .15s}
    .btn-p:hover{background:#4d97ff;transform:translateY(-2px)}
    .cat-badge{display:inline-block;padding:5px 11px;border-radius:100px;font-family:'Space Mono',monospace;
      font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(8px)}
    .cat-ai        {background:rgba(26,111,255,.22);border:1px solid rgba(26,111,255,.4);color:#4d97ff}
    .cat-marketing {background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.35);color:#00d4ff}
    .cat-automation{background:rgba(138,71,255,.2);border:1px solid rgba(138,71,255,.4);color:#b97fff}
    .cat-default   {background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#8a9bbf}
    .prose h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin:2.2rem 0 .9rem;color:#fff}
    .prose h3{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;margin:1.8rem 0 .7rem;color:#fff}
    .prose p{color:#8a9bbf;line-height:1.8;margin-bottom:1.2rem;font-size:1rem}
    .prose ul,.prose ol{color:#8a9bbf;line-height:1.8;margin-bottom:1.2rem;padding-left:1.4rem}
    .prose ul li,.prose ol li{margin-bottom:.5rem}
    .prose strong{color:#fff;font-weight:600}
    .prose a{color:#1a6fff;text-decoration:underline;text-underline-offset:3px}
    .prose a:hover{color:#4d97ff}
    .prose blockquote{border-left:3px solid #1a6fff;padding:12px 20px;margin:1.8rem 0;background:rgba(26,111,255,.06);border-radius:0 8px 8px 0}
    .prose blockquote p{color:#d0d8f0;margin:0}
    .prose img{width:100%;border-radius:12px;margin:1.6rem 0}
    .back-link{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
      color:#8a9bbf;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:#00d4ff}
    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,#111d35 25%,#182440 50%,#111d35 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body class="relative">

<nav id="nav" class="fixed top-0 left-0 right-0 z-50 py-5">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between gap-6">
    <a href="/homepage.html" class="flex items-center">
      <img src="/brand_asset/LogoMakr-9nt01b.png" alt="Mettamotion" class="logo-img" style="height:42px;width:auto" />
    </a>
    <ul class="hidden md:flex items-center gap-10" style="list-style:none">
      <li><a href="/blog" style="font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:#00d4ff;text-decoration:none">Blog</a></li>
      <li><a href="/contact" style="font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:#fff;text-decoration:none;transition:color .2s" onmouseover="this.style.color='#00d4ff'" onmouseout="this.style.color='#fff'">Contact</a></li>
    </ul>
    <a href="/free-audit" class="btn-p">Free Audit →</a>
  </div>
</nav>

<main class="relative z-10 max-w-3xl mx-auto px-6 pt-36 pb-28">
  <a href="/blog" class="back-link mb-8 block">← Back to Blog</a>

  <!-- Skeleton shown while loading -->
  <div id="skeleton">
    <div class="skeleton mb-5" style="height:22px;width:80px;border-radius:100px"></div>
    <div class="skeleton mb-3" style="height:40px;width:90%"></div>
    <div class="skeleton mb-10" style="height:40px;width:65%"></div>
    <div class="skeleton mb-12" style="height:380px;border-radius:16px"></div>
    <div class="skeleton mb-3" style="height:14px;width:100%"></div>
    <div class="skeleton mb-3" style="height:14px;width:96%"></div>
    <div class="skeleton mb-3" style="height:14px;width:88%"></div>
    <div class="skeleton mb-8" style="height:14px;width:70%"></div>
    <div class="skeleton mb-3" style="height:14px;width:100%"></div>
    <div class="skeleton mb-3" style="height:14px;width:93%"></div>
    <div class="skeleton" style="height:14px;width:80%"></div>
  </div>

  <!-- Post content (hidden until loaded) -->
  <div id="post-content" style="display:none">
    <span id="post-category" class="cat-badge mb-5 inline-block"></span>
    <h1 id="post-title" style="font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.15;letter-spacing:-.02em;margin-bottom:20px"></h1>
    <p id="post-meta" style="color:#3a4a6b;font-family:'Space Mono',monospace;font-size:.78rem;margin-bottom:40px"></p>
    <div class="rounded-2xl overflow-hidden mb-12" style="height:380px">
      <img id="post-cover" src="" alt="" style="width:100%;height:100%;object-fit:cover;filter:brightness(.85)" />
    </div>
    <div id="post-body" class="prose"></div>
    <div class="mt-16 pt-10" style="border-top:1px solid rgba(255,255,255,.06)">
      <p style="font-family:'Space Mono',monospace;font-size:.72rem;color:#3a4a6b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px">Ready to automate?</p>
      <a href="/homepage.html" class="btn-p">Get Your Free Audit →</a>
    </div>
  </div>

  <!-- Error state -->
  <div id="post-error" style="display:none;text-align:center;padding:60px 0">
    <p style="font-family:'Space Mono',monospace;font-size:.8rem;letter-spacing:.1em;color:#3a4a6b;margin-bottom:16px">POST NOT FOUND</p>
    <a href="/blog" class="back-link">← Back to Blog</a>
  </div>
</main>

<script>
  // ── Nav scroll ──
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 20), { passive: true });

  // ── Shared image logic (mirrors blog/index.html exactly) ──
  const FALLBACK_IMAGES = [
    { keywords: ['val kilmer', 'film', 'movie', 'actor', 'cinema'],      img: 'https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=1400&q=80' },
    { keywords: ['sora', 'video', 'text-to-video', 'openai shutdown'],   img: 'https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=1400&q=80' },
    { keywords: ['melania', 'robot', 'humanoid', 'white house', 'figure 03'], img: 'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1400&q=80' },
    { keywords: ['ai doc', 'documentary', 'father', 'peril', 'promise'], img: 'https://images.unsplash.com/photo-1677442136019-21780ecad979?w=1400&q=80' },
    { keywords: ['crossword', 'copilot', 'microsoft', 'puzzle'],         img: 'https://images.unsplash.com/photo-1586339949916-3e9457bef6d3?w=1400&q=80' },
    { keywords: ['lead generation', 'lead system', 'automated lead'],    img: 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1400&q=80' },
    { keywords: ['seo', 'search engine', 'future-proof seo', 'resilient seo', 'sustainable seo'], img: 'https://images.unsplash.com/photo-1432888498266-38ffec3eaf0a?w=1400&q=80' },
    { keywords: ['digital marketing career', 'career path', 'career blueprint'], img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1400&q=80' },
    { keywords: ['digital marketing strategy', 'future-proof digital', 'marketing strategy'], img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1400&q=80' },
    { keywords: ['digital marketing roadmap', 'high-roi', 'roi skills'], img: 'https://images.unsplash.com/photo-1533750349088-cd871a92f312?w=1400&q=80' },
    { keywords: ['remote work', 'work from home', 'remote'],             img: 'https://images.unsplash.com/photo-1587614382346-4ec70e388b28?w=1400&q=80' },
    { keywords: ['photography', 'camera', 'photo'],                      img: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1400&q=80' },
    { keywords: ['automation', 'workflow', 'automate'],                  img: 'https://images.unsplash.com/photo-1518186285589-2f7649de83e0?w=1400&q=80' },
    { keywords: ['ai', 'artificial intelligence', 'machine learning'],   img: 'https://images.unsplash.com/photo-1655720828018-edd2daec9349?w=1400&q=80' },
    { keywords: ['marketing', 'growth', 'brand'],                        img: 'https://images.unsplash.com/photo-1611162616475-46b635cb6868?w=1400&q=80' },
  ];

  const DEFAULT_IMG = 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1400&q=80';

  const CAT_MAP = {
    ai:         { cls: 'cat-ai',         label: 'AI' },
    marketing:  { cls: 'cat-marketing',  label: 'Marketing' },
    automation: { cls: 'cat-automation', label: 'Automation' },
  };

  function stripHtml(html) {
    return html.replace(/<[^>]+>/g, '').replace(/&[a-z]+;/gi, ' ').trim();
  }

  function getFallbackImage(title) {
    const t = title.toLowerCase();
    for (const { keywords, img } of FALLBACK_IMAGES) {
      if (keywords.some(k => t.includes(k))) return img;
    }
    return DEFAULT_IMG;
  }

  function getPostImage(post) {
    return post._embedded?.['wp:featuredmedia']?.[0]?.source_url
      || getFallbackImage(stripHtml(post.title.rendered));
  }

  function getCatStyle(slugs = []) {
    for (const slug of slugs) {
      const key = slug.toLowerCase();
      if (CAT_MAP[key]) return CAT_MAP[key];
    }
    return { cls: 'cat-default', label: slugs[0] || 'General' };
  }

  function readingTime(content) {
    const words = content.replace(/<[^>]+>/g, '').split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.round(words / 200)) + ' min read';
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── Load post ──
  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('slug');

    if (!slug) { showError(); return; }

    try {
      const res = await fetch(`https://mettamotion.com/wp-json/wp/v2/posts?_embed&slug=${encodeURIComponent(slug)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const posts = await res.json();
      if (!posts.length) throw new Error('not found');

      const post = posts[0];
      const title = stripHtml(post.title.rendered);
      const img   = getPostImage(post);
      const cats  = (post._embedded?.['wp:term']?.[0] || []).map(c => c.slug);
      const cat   = getCatStyle(cats);

      document.title = `${title} — Mettamotion Blog`;

      document.getElementById('post-category').textContent  = cat.label;
      document.getElementById('post-category').className    = `cat-badge mb-5 inline-block ${cat.cls}`;
      document.getElementById('post-title').innerHTML       = post.title.rendered;
      document.getElementById('post-meta').textContent      = `${formatDate(post.date)} · ${readingTime(post.content.rendered)}`;
      document.getElementById('post-cover').src             = img;
      document.getElementById('post-cover').alt             = title;
      // Strip leading image from content — we already show it as the cover above
      const cleanContent = post.content.rendered.replace(/^\s*(<figure[^>]*>[\s\S]*?<\/figure>|<p>\s*<img[^>]*>\s*<\/p>|<img[^>]*>)\s*/i, '');
      document.getElementById('post-body').innerHTML        = cleanContent;

      document.getElementById('skeleton').style.display     = 'none';
      document.getElementById('post-content').style.display = '';

    } catch (err) {
      console.error('Post load failed:', err);
      showError();
    }
  }

  function showError() {
    document.getElementById('skeleton').style.display  = 'none';
    document.getElementById('post-error').style.display = '';
  }

  loadPost();
</script>
</body>
</html>
